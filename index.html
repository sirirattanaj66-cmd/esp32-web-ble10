<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ESP32 Health Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
font-family: 'Segoe UI', sans-serif;
background: #f0f2f5;
color: #333;
}
.topnav {
background: #2c3e50;
color: white;
padding: 16px 24px;
text-align: center;
}
.topnav h1 { font-size: 1.4rem; }
.content {
max-width: 960px;
margin: 24px auto;
padding: 0 16px;
}
.card-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap: 16px;
margin-bottom: 16px;
}
.card {
background: white;
border-radius: 12px;
padding: 20px;
box-shadow: 0 2px 8px rgba(0,0,0,0.08);
text-align: center;
}
.card h2 {
font-size: 0.95rem;
color: #666;
margin-bottom: 12px;
}
.reading {
font-size: 2rem;
font-weight: bold;
color: #2c3e50;
}
.unit { font-size: 1rem; color: #888; }
.gray-label {
font-size: 0.75rem;
color: #aaa;
margin-top: 8px;
}
.btn-row {
display: flex;
gap: 8px;
justify-content: center;
flex-wrap: wrap;
margin-top: 8px;
}
button {
padding: 10px 20px;
border: none;
border-radius: 8px;
cursor: pointer;
font-size: 0.9rem;
font-weight: bold;
transition: opacity 0.2s;
}
button:hover { opacity: 0.85; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.connectButton { background: #27ae60; color: white; }
.disconnectButton { background: #e74c3c; color: white; }
.onButton { background: #f39c12; color: white; }
.offButton { background: #95a5a6; color: white; }
.saveButton { background: #2980b9; color: white; }
.downloadButton { background: #8e44ad; color: white; }
.clearButton { background: #c0392b; color: white; }
.status-dot {
display: inline-block;
width: 10px; height: 10px;
border-radius: 50%;
background: red;
margin-right: 6px;
vertical-align: middle;
}
.status-dot.connected { background: #27ae60; }
/* ===== TABLE ===== */
.table-wrap {
overflow-x: auto;
margin-top: 8px;
}
table {
width: 100%;
border-collapse: collapse;
font-size: 0.85rem;
}
th {
background: #2c3e50;
color: white;
padding: 8px 12px;
text-align: center;
}
td {
padding: 7px 12px;
text-align: center;
border-bottom: 1px solid #eee;
}
tr:nth-child(even) { background: #f9f9f9; }
tr:hover { background: #eaf4ff; }
.record-count {
font-size: 0.8rem;
color: #888;
margin-top: 6px;
}
.flash {
animation: flash 0.4s ease;
}
@keyframes flash {
0% { background: #d5f5e3; }
100% { background: white; }
}
</style>
</head>
<body>
<div class="topnav">
<h1>🩺 ESP32 Health Monitor</h1>
</div>
<div class="content">
<!-- CONNECTION -->
<div class="card-grid">
<div class="card" style="grid-column: 1 / -1;">
<div class="btn-row">
<button id="connectBleButton" class="connectButton">🔗 Connect BLE</button>
<button id="disconnectBleButton" class="disconnectButton">✖
Disconnect</button>
</div>
<p class="gray-label" style="margin-top:12px;">
<span class="status-dot" id="statusDot"></span>
BLE Status: <strong><span id="bleState">Disconnected</span></strong>
</p>
</div>
</div>
<!-- VITAL SIGNS -->
<div class="card-grid">
<div class="card">
<h2>❤ Heart Rate</h2>
<p class="reading"><span id="hrValue">--</span></p>
<p class="unit">bpm</p>
<p class="gray-label">Last: <span id="hrTime">--</span></p>
</div>
<div class="card">
<h2>🩸 SpO₂</h2>
<p class="reading"><span id="spo2Value">--</span></p>
<p class="unit">%</p>
<p class="gray-label">Last: <span id="spo2Time">--</span></p>
</div>
<div class="card">
<h2>🌡 Body Temp</h2>
<p class="reading"><span id="tempValue">--</span></p>
<p class="unit">°C</p>
<p class="gray-label">Last: <span id="tempTime">--</span></p>
</div>
</div>
<!-- LED CONTROL -->
<div class="card-grid">
<div class="card" style="grid-column: 1 / -1;">
<h2>💡 Control LED (GPIO 2)</h2>
<div class="btn-row">
<button id="onButton" class="onButton">ON</button>
<button id="offButton" class="offButton">OFF</button>
</div>
<p class="gray-label">Last sent: <span id="valueSent">--</span></p>
</div>
</div>
<!-- SAVE & DOWNLOAD -->
<div class="card-grid">
<div class="card" style="grid-column: 1 / -1;">
<h2>📋 Data Logger</h2>
<div class="btn-row">
<button id="saveButton" class="saveButton">💾 บันทึกค่าปัจจุบัน</button>
<button id="downloadButton" class="downloadButton">⬇ ดาวน์โหลด CSV</button>
<button id="clearButton" class="clearButton">🗑 ล้างข้อมูล</button>
</div>
<p class="record-count">บันทึกแล้ว: <strong><span
id="recordCount">0</span></strong> รายการ</p>
<div class="table-wrap">
<table id="dataTable">
<thead>
<tr>
<th>#</th>
<th>เวลา</th>
<th>❤ HR (bpm)</th>
<th>🩸 SpO₂ (%)</th>
<th>🌡 Temp (°C)</th>
</tr>
</thead>
<tbody id="tableBody">
<tr>
<td colspan="5" style="color:#aaa; padding:20px;">ยังไม่มีข้อมูล</td>
</tr>
</tbody>
</table>
</div>
</div>
</div>
</div>
<script>
/* ===== ELEMENTS ===== */
const connectBtn = document.getElementById("connectBleButton");
const disconnectBtn = document.getElementById("disconnectBleButton");
const onBtn = document.getElementById("onButton");
const offBtn = document.getElementById("offButton");
const saveBtn = document.getElementById("saveButton");
const downloadBtn = document.getElementById("downloadButton");
const clearBtn = document.getElementById("clearButton");
const bleState = document.getElementById("bleState");
const statusDot = document.getElementById("statusDot");
const hrValue = document.getElementById("hrValue");
const hrTime = document.getElementById("hrTime");
const spo2Value = document.getElementById("spo2Value");
const spo2Time = document.getElementById("spo2Time");
const tempValue = document.getElementById("tempValue");
const tempTime = document.getElementById("tempTime");
const valueSent = document.getElementById("valueSent");
const tableBody = document.getElementById("tableBody");
const recordCount = document.getElementById("recordCount");
/* ===== UUID ===== */
const deviceName = "ESP32JuLie";
const serviceUUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
const tempUUID = "19b10001-e8f2-537e-4f6c-d104768a1214";
const ledUUID = "19b10002-e8f2-537e-4f6c-d104768a1214";
const hrUUID = "19b10003-e8f2-537e-4f6c-d104768a1214";
const spo2UUID = "19b10004-e8f2-537e-4f6c-d104768a1214";
/* ===== STATE ===== */
let bleDevice = null;
let bleServer = null;
let bleService = null;
let records = [];
/* ===== EVENTS ===== */
connectBtn.onclick = connectBLE;
disconnectBtn.onclick = disconnectBLE;
onBtn.onclick = () => writeLED(1);
offBtn.onclick = () => writeLED(0);
saveBtn.onclick = saveRecord;
downloadBtn.onclick = downloadCSV;
clearBtn.onclick = clearRecords;
const now = () => new Date().toLocaleTimeString();
/* ===== STATUS ===== */
function setStatus(connected) {
bleState.textContent = connected ? "Connected" : "Disconnected";
bleState.style.color = connected ? "green" : "red";
statusDot.className = "status-dot" + (connected ? " connected" : "");
}
/* ===== CONNECT ===== */
async function connectBLE() {
try {
bleDevice = await navigator.bluetooth.requestDevice({
filters: [{ name: deviceName }],
optionalServices: [serviceUUID],
});
bleDevice.addEventListener("gattservicedisconnected", onDisconnected);
bleServer = await bleDevice.gatt.connect();
bleService = await bleServer.getPrimaryService(serviceUUID);
setStatus(true);
/* Heart Rate */
const hrChar = await bleService.getCharacteristic(hrUUID);
hrChar.addEventListener("characteristicvaluechanged", e => {
hrValue.textContent = new TextDecoder().decode(e.target.value).trim();
hrTime.textContent = now();
});
await hrChar.startNotifications();
/* SpO2 */
const spo2Char = await bleService.getCharacteristic(spo2UUID);
spo2Char.addEventListener("characteristicvaluechanged", e => {
spo2Value.textContent = new TextDecoder().decode(e.target.value).trim();
spo2Time.textContent = now();
});
await spo2Char.startNotifications();
/* Body Temp */
const tempChar = await bleService.getCharacteristic(tempUUID);
tempChar.addEventListener("characteristicvaluechanged", e => {
tempValue.textContent = new TextDecoder().decode(e.target.value).trim();
tempTime.textContent = now();
});
await tempChar.startNotifications();
} catch (err) {
console.error(err);
setStatus(false);
}
}
/* ===== WRITE LED ===== */
async function writeLED(val) {
if (!bleService) { alert("Not connected"); return; }
try {
const char = await bleService.getCharacteristic(ledUUID);
await char.writeValue(new Uint8Array([val]));
valueSent.textContent = val ? "ON" : "OFF";
} catch (err) { console.error(err); }
}
/* ===== DISCONNECT ===== */
function disconnectBLE() {
if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
}
function onDisconnected() {
setStatus(false);
bleService = null;
}
/* ===== SAVE RECORD ===== */
function saveRecord() {
const hr = hrValue.textContent;
const spo2 = spo2Value.textContent;
const temp = tempValue.textContent;
if (hr === "--" && spo2 === "--" && temp === "--") {
alert("ยังไม่มีข้อมูลจาก ESP32");
return;
}
const timestamp = new Date().toLocaleString("th-TH");
const record = { timestamp, hr, spo2, temp };
records.push(record);
updateTable(record);
recordCount.textContent = records.length;
// flash บัตร save
const card = saveBtn.closest(".card");
card.classList.remove("flash");
void card.offsetWidth;
card.classList.add("flash");
}
/* ===== UPDATE TABLE ===== */
function updateTable(record) {
// ลบข้อความ "ยังไม่มีข้อมูล" ออก
if (records.length === 1) tableBody.innerHTML = "";
const tr = document.createElement("tr");
tr.innerHTML = `
<td>${records.length}</td>
<td>${record.timestamp}</td>
<td>${record.hr}</td>
<td>${record.spo2}</td>
<td>${record.temp}</td>
`;
tableBody.appendChild(tr);
// scroll ไปบรรทัดล่าสุด
tr.scrollIntoView({ behavior: "smooth", block: "nearest" });
}
/* ===== DOWNLOAD CSV ===== */
function downloadCSV() {
if (records.length === 0) {
alert("ยังไม่มีข้อมูลที่บันทึก");
return;
}
const header = "No,Timestamp,HR (bpm),SpO2 (%),Temp (C)\n";
const rows = records.map((r, i) =>
`${i + 1},"${r.timestamp}",${r.hr},${r.spo2},${r.temp}`
).join("\n");
const blob = new Blob(["\uFEFF" + header + rows], { type: "text/csv;charset=utf-8;" });
const url = URL.createObjectURL(blob);
const a = document.createElement("a");
a.href = url;
a.download = `health_data_${new Date().toISOString().slice(0,10)}.csv`;
a.click();
URL.revokeObjectURL(url);
}
/* ===== CLEAR ===== */
function clearRecords() {
if (records.length === 0) return;
if (!confirm(`ลบข้อมูล ${records.length} รายการ?`)) return;
records = [];
recordCount.textContent = 0;
tableBody.innerHTML = `<tr><td colspan="5" style="color:#aaa; padding:20px;">ยังไม่มีข้อมูล
</td></tr>`;
}
</script>
</body>
</html>
